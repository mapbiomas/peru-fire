# MapBiomas Fire Monitor — Sentinel-2
# Conda environment (recommended for local execution — resolves GDAL automatically)
#
# Create:
#   conda env create -f environment.yml
#   conda activate fire_monitor
#
# Update:
#   conda env update -f environment.yml --prune
#
# Authenticate after activation:
#   earthengine authenticate
#   gcloud auth application-default login

name: fire_monitor

channels:
  - conda-forge  # required for GDAL + rasterio
  - defaults

dependencies:
  # ── Python
  - python=3.10

  # ── Geospatial (via conda-forge — resolves GDAL automatically)
  - gdal>=3.6.0
  - rasterio>=1.3.8
  - proj>=9.0.0
  - libgdal

  # ── Scientific
  - numpy>=1.24.0,<2.0.0
  - scipy>=1.11.0
  - matplotlib>=3.7.0

  # ── Notebook / UI
  - jupyter>=1.0.0
  - jupyterlab>=4.0.0
  - notebook>=7.0.0
  - ipywidgets>=8.0.0
  - nodejs>=18.0.0    # required by jupyterlab extensions

  # ── Utilities
  - tqdm>=4.65.0
  - python-dotenv>=1.0.0

  # ── pip-only packages
  - pip
  - pip:
    - earthengine-api>=0.1.390
    - google-cloud-storage>=2.10.0
    - gcsfs>=2023.9.0
    - tensorflow==2.13.0     # TF2 with tf.compat.v1
